<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我介绍 - 杨子轩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-white min-h-screen flex items-center justify-center p-4">
    <!-- 主内容卡片 -->
    <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 max-w-md w-full card-hover">
        <!-- 头像区域 -->
        <div class="flex justify-center mb-8">
            <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center">
                <i class="fa fa-user text-primary text-4xl"></i>
            </div>
        </div>
        
        <!-- 个人信息 -->
        <div class="space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">杨子轩</h1>
                <p class="text-gray-500">高一8班学生</p>
            </div>
            
            <div class="space-y-4">
                <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary">
                        <i class="fa fa-university"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">学校</p>
                        <p class="font-medium">中国中学</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary">
                        <i class="fa fa-users"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">班级</p>
                        <p class="font-medium">高一8班</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-lg">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary">
                        <i class="fa fa-id-card"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">姓名</p>
                        <p class="font-medium">杨子轩</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
