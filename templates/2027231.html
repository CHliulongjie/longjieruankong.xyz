<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>steam🐟的自我介绍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6ecbf5 0%, #059ee3 100%);
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        
        .intro-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border: 5px solid #ff9e4a;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        
        .scene-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff6b8b;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .scene-toggle:hover {
            background: #ff4d73;
            transform: translateY(-2px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #ff9e4a, #ff6b8b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .name {
            font-size: 2.5rem;
            color: #ff6b8b;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #ffe259;
        }
        
        .class-info {
            font-size: 1.2rem;
            color: #555;
            background: #e6f7ff;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed #4dabf7;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .info-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #4dabf7;
        }
        
        .hobby-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #ff9e4a;
        }
        
        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title i {
            color: #ff6b8b;
        }
        
        .info-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-item i {
            color: #4dabf7;
            width: 20px;
        }
        
        .hobby-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #fff9db;
            border-radius: 10px;
            border: 2px dotted #ffd43b;
        }
        
        .hobby-title {
            font-weight: bold;
            color: #e67700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hobby-desc {
            color: #666;
            font-size: 0.95rem;
        }
        
        .sleep-indicator {
            background: #ffeef3;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            border: 2px dashed #ff9e4a;
            position: relative;
            overflow: hidden;
        }
        
        .sleep-text {
            font-size: 1.1rem;
            color: #ff6b8b;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .sleep-bar {
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .sleep-progress {
            height: 100%;
            width: 85%;
            background: linear-gradient(90deg, #ff9e4a, #ff6b8b);
            border-radius: 10px;
            animation: sleepPulse 2s infinite;
        }
        
        @keyframes sleepPulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        
        .sleep-time {
            position: absolute;
            top: 0;
            right: 10px;
            font-size: 0.8rem;
            color: #666;
            line-height: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .cat {
            position: absolute;
            font-size: 2rem;
            z-index: 5;
            animation: float 6s infinite ease-in-out;
        }
        
        .cat-1 {
            top: 20px;
            left: 30px;
            animation-delay: 0s;
        }
        
        .cat-2 {
            bottom: 40px;
            right: 40px;
            animation-delay: 2s;
        }
        
        .cat-3 {
            top: 60px;
            right: 100px;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0); }
        }
        
        .zzz {
            position: absolute;
            color: #4dabf7;
            font-size: 1.5rem;
            opacity: 0;
            animation: zzz 3s infinite;
        }
        
        @keyframes zzz {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px) scale(1); }
        }
        
        /* 睡眠模式样式 */
        .sleep-mode {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            color: #e3f2fd;
        }
        
        .sleep-mode .intro-card {
            background: rgba(30, 30, 70, 0.9);
            border-color: #5c6bc0;
            color: #e3f2fd;
        }
        
        .sleep-mode .info-box,
        .sleep-mode .hobby-box {
            background: rgba(40, 40, 90, 0.7);
            color: #e3f2fd;
            border-left-color: #7986cb;
        }
        
        .sleep-mode .section-title {
            color: #c5cae9;
        }
        
        .sleep-mode .hobby-item {
            background: rgba(50, 50, 100, 0.7);
            border-color: #5c6bc0;
        }
        
        .sleep-mode .sleep-indicator {
            background: rgba(60, 60, 110, 0.7);
            border-color: #7986cb;
        }
        
        .sleep-mode .class-info {
            background: rgba(70, 70, 120, 0.7);
            color: #c5cae9;
            border-color: #7986cb;
        }
        
        @media (max-width: 650px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .name {
                font-size: 2rem;
            }
            
            .cat {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="scene-toggle" id="sceneToggle">
            <i class="fas fa-moon"></i> 切换到睡眠模式
        </button>
        
        <div class="cat cat-1">😺</div>
        <div class="cat cat-2">🐱</div>
        <div class="cat cat-3">😼</div>
        
        <div class="intro-card" id="introCard">
            <div class="header">
                <div class="avatar">
                    🐟
                </div>
                <h1 class="name">steam🐟</h1>
                <div class="class-info">
                    <i class="fas fa-school"></i> 中国中学 高二（2）班
                </div>
            </div>
            
            <div class="content">
                <div class="info-box">
                    <h2 class="section-title"><i class="fas fa-user"></i> 基本信息</h2>
                    <div class="info-item">
                        <i class="fas fa-signature"></i>
                        <span><strong>名字：</strong> steam🐟</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-birthday-cake"></i>
                        <span><strong>年龄：</strong> 17岁</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span><strong>学校：</strong> 中国中学</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-users"></i>
                        <span><strong>班级：</strong> 高二（2）班</span>
                    </div>
                </div>
                
                <div class="hobby-box">
                    <h2 class="section-title"><i class="fas fa-gamepad"></i> 兴趣爱好</h2>
                    <div class="hobby-item">
                        <div class="hobby-title">
                            <i class="fas fa-dragon"></i> 卡兹游戏老登
                        </div>
                        <div class="hobby-desc">
                            每天晚上玩卡兹玩到两点半，技术日渐精进，段位持续上升中！
                        </div>
                    </div>
                    <div class="hobby-item">
                        <div class="hobby-title">
                             <i class="fas fa-fish"></i> 战争雷霆糕手
                        </div>
                        <div class="hobby-desc">
                            德系6.7资深玩家，bwd居然削我虎王，被兹本做局了QwQ
                        </div>
                    </div>
                    <div class="hobby-item">
                        <div class="hobby-title">
                            <i class="fas fa-bed"></i> 课堂补觉专家
                        </div>
                        <div class="hobby-desc">
                            因夜间游戏活动，白天课堂上培养出了在任何环境下都能快速入睡的特殊技能喵~
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="sleep-indicator">
                <div class="sleep-text">
                    <i class="fas fa-bed"></i> 今日睡眠状态
                </div>
                <div class="sleep-bar">
                    <div class="sleep-progress"></div>
                    <div class="sleep-time">凌晨 2:30</div>
                </div>
            </div>
            
            <div class="footer">
                <p>感谢参观我的自我介绍页面，希望没有在课堂上睡着的时候被老师发现喵~ 🐱</p>
            </div>
        </div>
    </div>

    <script>
        // 场景切换功能
        const sceneToggle = document.getElementById('sceneToggle');
        const body = document.body;
        const introCard = document.getElementById('introCard');
        let isSleepMode = false;
        
        sceneToggle.addEventListener('click', function() {
            isSleepMode = !isSleepMode;
            
            if(isSleepMode) {
                body.classList.add('sleep-mode');
                sceneToggle.innerHTML = '<i class="fas fa-sun"></i> 切换到白天模式';
                
                // 添加睡眠ZZZ动画
                for(let i = 0; i < 5; i++) {
                    createZzz();
                }
            } else {
                body.classList.remove('sleep-mode');
                sceneToggle.innerHTML = '<i class="fas fa-moon"></i> 切换到睡眠模式';
                
                // 移除所有ZZZ元素
                document.querySelectorAll('.zzz').forEach(el => el.remove());
            }
        });
        
        // 创建ZZZ动画元素
        function createZzz() {
            const zzz = document.createElement('div');
            zzz.className = 'zzz';
            zzz.innerHTML = 'Zzz';
            zzz.style.left = Math.random() * 90 + '%';
            zzz.style.top = Math.random() * 90 + '%';
            zzz.style.animationDelay = Math.random() * 2 + 's';
            introCard.appendChild(zzz);
            
            // 3秒后移除
            setTimeout(() => {
                if(zzz.parentNode) {
                    zzz.parentNode.removeChild(zzz);
                }
            }, 3000);
        }
        
        // 持续添加ZZZ元素（睡眠模式下）
        setInterval(() => {
            if(isSleepMode) {
                createZzz();
            }
        }, 800);
        
        // 添加鼠标跟随效果
        document.addEventListener('mousemove', function(e) {
            if(!isSleepMode) return;
            
            const x = e.clientX;
            const y = e.clientY;
            
            // 创建跟随的ZZZ
            const followZzz = document.createElement('div');
            followZzz.className = 'zzz';
            followZzz.innerHTML = 'Zzz';
            followZzz.style.left = x + 'px';
            followZzz.style.top = y + 'px';
            followZzz.style.position = 'fixed';
            document.body.appendChild(followZzz);
            
            // 1秒后移除
            setTimeout(() => {
                if(followZzz.parentNode) {
                    followZzz.parentNode.removeChild(followZzz);
                }
            }, 1000);
        });
    </script>
</body>
</html>
