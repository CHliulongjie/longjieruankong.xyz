<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杭台高铁动态运营图</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .map-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .map-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #ffde59;
        }
        
        .railway-map {
            height: 500px;
            position: relative;
            background: rgba(0, 30, 60, 0.4);
            border-radius: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 20px 0;
        }
        
        .railway-map-inner {
            display: inline-block;
            min-width: 1800px;
            height: 100%;
            position: relative;
        }
        
        .station {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffde59;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ffde59;
            z-index: 5;
        }
        
        .station.active {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .station-label {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
            white-space: nowrap;
            z-index: 6;
        }
        
        .rail-line {
            position: absolute;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            transform-origin: left center;
            top: 50%;
            z-index: 1;
        }
        
        .train {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 0 15px currentColor;
            z-index: 10;
            transition: left 0.5s ease-out;
        }
        
        .train.dz {
            background: #e74c3c;
            color: white;
        }
        
        .train.dk {
            background: #3498db;
            color: white;
        }
        
        .train.zz {
            background: #2ecc71;
            color: white;
        }
        
        .train.arrived {
            animation: arrive 1s forwards;
        }
        
        @keyframes arrive {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .panel-title {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #ffde59;
            text-align: center;
        }
        
        .time-display {
            font-size: 2.5rem;
            text-align: center;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            background: #ffde59;
            color: #1a2980;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn.pause {
            background: #3498db;
            color: white;
        }
        
        .btn.reset {
            background: #e74c3c;
            color: white;
        }
        
        .legend {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        
        .legend-color {
            width: 25px;
            height: 25px;
            border-radius: 50%;
        }
        
        .color-dz { background: #e74c3c; }
        .color-dk { background: #3498db; }
        .color-zz { background: #2ecc71; }
        
        .train-list {
            margin-top: 30px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
        }
        
        .train-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        
        .train-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .train-item:last-child {
            border-bottom: none;
        }
        
        .train-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .status-running {
            background: rgba(52, 152, 219, 0.3);
        }
        
        .status-arrived {
            background: rgba(46, 204, 113, 0.3);
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .train-type {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .train-type.dz { background: rgba(231, 76, 60, 0.3); }
        .train-type.dk { background: rgba(52, 152, 219, 0.3); }
        .train-type.zz { background: rgba(46, 204, 113, 0.3); }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-top: 30px;
        }
        
        .highlight {
            color: #ffde59;
            font-weight: bold;
        }
        
        .optimization-points {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .point-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .point-card i {
            font-size: 2rem;
            color: #ffde59;
            margin-bottom: 10px;
        }
        
        @media (max-width: 900px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .railway-map {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-train"></i> 杭台高铁动态运营图</h1>
            <div class="subtitle">实时显示列车位置 - 每5分钟更新一次</div>
        </header>
        
        <div class="main-content">
            <div class="map-container">
                <h2 class="map-title">杭台高铁线路图</h2>
                <div class="railway-map" id="railwayMap">
                    <div class="railway-map-inner" id="railwayMapInner">
                        <!-- 铁路线和车站将通过JS动态生成 -->
                    </div>
                </div>
            </div>
            
            <div class="info-panel">
                <h2 class="panel-title">运营信息</h2>
                
                <div class="time-display">
                    <i class="fas fa-clock"></i> 
                    <span id="currentTime">06:00</span>
                </div>
                
                <div class="controls">
                    <button class="btn" id="playBtn">
                        <i class="fas fa-play"></i> 开始
                    </button>
                    <button class="btn pause" id="pauseBtn">
                        <i class="fas fa-pause"></i> 暂停
                    </button>
                    <button class="btn reset" id="resetBtn">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                    <button class="btn" id="speedBtn">
                        <i class="fas fa-tachometer-alt"></i> 速度: 正常
                    </button>
                </div>
                
                <div class="legend">
                    <h3><i class="fas fa-tags"></i> 图例说明</h3>
                    <div class="legend-item">
                        <div class="legend-color color-dz"></div>
                        <span>直达快车 (DZ) - 仅停靠杭州东、绍兴北、嵊州新昌</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-dk"></div>
                        <span>大站快车 (DK) - 停靠主要车站</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color color-zz"></div>
                        <span>站站停列车 (ZZ) - 停靠所有车站</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ffde59;"></div>
                        <span>闪烁车站 - 当前有列车停靠</span>
                    </div>
                </div>
                
                <div class="train-list">
                    <h3><i class="fas fa-list"></i> 当前运行列车</h3>
                    <div id="trainList">
                        <!-- 列车列表将通过JS动态生成 -->
                    </div>
                </div>
            </div>
        </div>
        
        
        
        

    <script>
        // 车站数据
        const stations = [
            { name: "杭州东", position: 100 },
            { name: "绍兴北", position: 300 },
            { name: "上虞南", position: 500 },
            { name: "嵊州北", position: 700 },
            { name: "嵊州新昌", position: 900 },
            { name: "天台山", position: 1100 },
            { name: "临海", position: 1300 },
            { name: "台州", position: 1500 },
            { name: "温岭", position: 1700 }
        ];
        
        // 列车数据
        const trains = [
            // 下行列车 (杭州东 -> 温岭)
            { id: "G7501", type: "dz", direction: "down", 
              schedule: ["06:00", "06:25", null, null, "06:50", null, null, null, "07:30"] },
            { id: "G7511", type: "dk", direction: "down", 
              schedule: ["06:15", "06:40", null, null, "07:03", "07:18", null, "07:43", "07:58"] },
            { id: "G7523", type: "zz", direction: "down", 
              schedule: ["06:30", "06:55", "07:10", "07:25", "07:40", "07:55", "08:10", "08:25", "08:45"] },
            { id: "G7535", type: "dz", direction: "down", 
              schedule: ["09:00", "09:25", null, null, "09:50", null, null, null, "10:30"] },
            { id: "G7537", type: "dz", direction: "down", 
              schedule: ["12:00", "12:25", null, null, "12:50", null, null, null, "13:30"] },
            { id: "G7547", type: "dk", direction: "down", 
              schedule: ["12:15", "12:40", null, null, "13:03", "13:18", null, "13:43", "13:58"] },
            { id: "G7571", type: "dz", direction: "down", 
              schedule: ["17:00", "17:25", null, null, "17:50", null, null, null, "18:30"] },
            { id: "G7595", type: "zz", direction: "down", 
              schedule: ["19:00", "19:25", "19:40", "19:55", "20:10", "20:25", "20:40", "20:55", "21:15"] },
            { id: "G7607", type: "dk", direction: "down", 
              schedule: ["21:00", "21:25", null, null, "21:48", null, null, "22:13", "22:28"] },
            
            // 上行列车 (温岭 -> 杭州东)
            { id: "G7602", type: "dz", direction: "up", 
              schedule: ["06:15", null, null, null, "06:40", null, null, null, "07:35"] },
            { id: "G7615", type: "dk", direction: "up", 
              schedule: ["06:30", null, null, "07:05", "07:20", null, null, "07:45", "08:20"] },
            { id: "G7628", type: "zz", direction: "up", 
              schedule: ["06:45", "07:05", "07:20", "07:35", "07:50", "08:05", "08:20", "08:45", "09:10"] },
            { id: "G7645", type: "dz", direction: "up", 
              schedule: ["09:15", null, null, null, "09:40", null, null, null, "10:35"] },
            { id: "G7647", type: "dz", direction: "up", 
              schedule: ["12:15", null, null, null, "12:40", null, null, null, "13:35"] },
            { id: "G7657", type: "dk", direction: "up", 
              schedule: ["12:30", null, null, "13:05", "13:20", null, null, "13:45", "14:20"] },
            { id: "G7681", type: "dz", direction: "up", 
              schedule: ["17:15", null, null, null, "17:40", null, null, null, "18:35"] },
            { id: "G7705", type: "zz", direction: "up", 
              schedule: ["19:45", "20:05", "20:20", "20:35", "20:50", "21:05", "21:20", "21:45", "22:10"] },
            { id: "G7717", type: "dk", direction: "up", 
              schedule: ["21:00", null, null, "21:35", null, null, null, "22:00", "22:35"] }
        ];
        
        // DOM元素
        const railwayMapInner = document.getElementById('railwayMapInner');
        const currentTimeEl = document.getElementById('currentTime');
        const trainListEl = document.getElementById('trainList');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedBtn = document.getElementById('speedBtn');
        
        // 全局变量
        let currentTime = "06:00";
        let animationInterval;
        let isPlaying = false;
        let animationSpeed = 1000; // 默认1秒推进5分钟
        let activeStations = [];
        let speeds = [2000, 1000, 500]; // 慢速、正常、快速
        let speedIndex = 1; // 初始为正常速度
        
        // 初始化铁路地图
        function initRailwayMap() {
            // 创建铁路线
            const line = document.createElement('div');
            line.className = 'rail-line';
            line.style.width = '1700px';
            line.style.height = '4px';
            line.style.top = '50%';
            line.style.left = '50px';
            railwayMapInner.appendChild(line);
            
            // 创建车站
            stations.forEach((station, index) => {
                const stationEl = document.createElement('div');
                stationEl.className = 'station';
                stationEl.id = `station-${index}`;
                stationEl.style.left = `${station.position}px`;
                stationEl.style.top = '50%';
                railwayMapInner.appendChild(stationEl);
                
                const label = document.createElement('div');
                label.className = 'station-label';
                label.textContent = station.name;
                label.style.left = `${station.position}px`;
                label.style.top = '30%';
                railwayMapInner.appendChild(label);
            });
        }
        
        // 计算列车当前位置
        function calculateTrainPosition(train, time) {
            // 将时间转换为分钟数
            const [currentHours, currentMinutes] = time.split(':').map(Number);
            const currentTotalMinutes = currentHours * 60 + currentMinutes;
            
            // 找到当前列车所在区间
            let prevStationIndex = -1;
            let nextStationIndex = -1;
            
            for (let i = 0; i < train.schedule.length; i++) {
                if (train.schedule[i] === null) continue;
                
                const [scheduleHours, scheduleMinutes] = train.schedule[i].split(':').map(Number);
                const scheduleTotalMinutes = scheduleHours * 60 + scheduleMinutes;
                
                if (scheduleTotalMinutes <= currentTotalMinutes) {
                    prevStationIndex = i;
                } else {
                    nextStationIndex = i;
                    break;
                }
            }
            
            // 如果列车尚未出发或已完成行程
            if (prevStationIndex === -1) return null;
            if (nextStationIndex === -1) return null;
            
            // 获取前后车站的时间
            const prevTimeStr = train.schedule[prevStationIndex];
            const nextTimeStr = train.schedule[nextStationIndex];
            
            const [prevHours, prevMinutes] = prevTimeStr.split(':').map(Number);
            const [nextHours, nextMinutes] = nextTimeStr.split(':').map(Number);
            
            const prevTotalMinutes = prevHours * 60 + prevMinutes;
            const nextTotalMinutes = nextHours * 60 + nextMinutes;
            
            // 计算时间比例
            const timeRatio = (currentTotalMinutes - prevTotalMinutes) / 
                             (nextTotalMinutes - prevTotalMinutes);
            
            // 获取前后车站的位置
            const prevPosition = stations[prevStationIndex].position;
            const nextPosition = stations[nextStationIndex].position;
            
            // 计算当前位置
            let currentPosition = prevPosition + (nextPosition - prevPosition) * timeRatio;
            
            // 关键修复：上行列车从右向左移动
            if (train.direction === "up") {
                currentPosition = 1700 - currentPosition;
            }
            
            return {
                position: currentPosition,
                prevStation: stations[prevStationIndex].name,
                nextStation: stations[nextStationIndex].name,
                prevTime: prevTimeStr,
                nextTime: nextTimeStr,
                isArrived: (currentTotalMinutes === prevTotalMinutes)
            };
        }
        
        // 更新列车位置
        function updateTrainPositions() {
            // 清除现有列车
            document.querySelectorAll('.train').forEach(train => train.remove());
            
            // 重置所有车站激活状态
            activeStations.forEach(stationId => {
                const stationEl = document.getElementById(stationId);
                if (stationEl) stationEl.classList.remove('active');
            });
            activeStations = [];
            
            // 更新列车列表
            trainListEl.innerHTML = '';
            
            trains.forEach(train => {
                const positionData = calculateTrainPosition(train, currentTime);
                
                if (positionData) {
                    // 创建列车元素
                    const trainEl = document.createElement('div');
                    trainEl.className = `train ${train.type}`;
                    trainEl.style.left = `${positionData.position}px`;
                    trainEl.style.top = '50%';
                    trainEl.title = `${train.id} (${train.type.toUpperCase()})\n从 ${positionData.prevStation} 到 ${positionData.nextStation}`;
                    railwayMapInner.appendChild(trainEl);
                    
                    // 如果列车正好到站，添加到达效果
                    if (positionData.isArrived) {
                        trainEl.classList.add('arrived');
                        
                        // 激活车站
                        const stationIndex = stations.findIndex(s => s.name === positionData.prevStation);
                        if (stationIndex !== -1) {
                            const stationId = `station-${stationIndex}`;
                            const stationEl = document.getElementById(stationId);
                            if (stationEl) {
                                stationEl.classList.add('active');
                                activeStations.push(stationId);
                            }
                        }
                    }
                    
                    // 添加到列车列表
                    const trainItem = document.createElement('div');
                    trainItem.className = 'train-item';
                    
                    trainItem.innerHTML = `
                        <div class="train-info">
                            <strong>${train.id}</strong> 
                            <span class="train-type ${train.type}">${train.type.toUpperCase()}</span>
                        </div>
                        <div class="train-route">
                            ${positionData.prevStation} → ${positionData.nextStation}
                        </div>
                        <div class="train-status ${positionData.isArrived ? 'status-arrived' : 'status-running'}">
                            ${positionData.isArrived ? '已到站' : '运行中'}
                        </div>
                    `;
                    trainListEl.appendChild(trainItem);
                }
            });
        }
        
        // 更新时间显示
        function updateTimeDisplay() {
            currentTimeEl.textContent = currentTime;
        }
        
        // 前进5分钟
        function advanceTime() {
            let [hours, minutes] = currentTime.split(':').map(Number);
            
            minutes += 5;
            if (minutes >= 60) {
                minutes -= 60;
                hours += 1;
            }
            
            // 如果超过24:00，重置到06:00
            if (hours >= 24) {
                hours = 6;
                minutes = 0;
            }
            
            // 格式化时间
            currentTime = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            
            updateTimeDisplay();
            updateTrainPositions();
        }
        
        // 开始动画
        function startAnimation() {
            if (isPlaying) return;
            
            isPlaying = true;
            playBtn.disabled = true;
            pauseBtn.disabled = false;
            
            // 清除现有定时器
            if (animationInterval) clearInterval(animationInterval);
            
            animationInterval = setInterval(() => {
                advanceTime();
                
                // 如果到达24:00，停止动画
                if (currentTime === "00:00" || currentTime === "24:00") {
                    stopAnimation();
                }
            }, animationSpeed);
        }
        
        // 暂停动画
        function stopAnimation() {
            isPlaying = false;
            clearInterval(animationInterval);
            playBtn.disabled = false;
            pauseBtn.disabled = false;
        }
        
        // 重置动画
        function resetAnimation() {
            stopAnimation();
            currentTime = "06:00";
            updateTimeDisplay();
            updateTrainPositions();
        }
        
        // 切换动画速度
        function toggleSpeed() {
            speedIndex = (speedIndex + 1) % speeds.length;
            animationSpeed = speeds[speedIndex];
            
            // 更新按钮文本
            const speedLabels = ["慢速", "正常", "快速"];
            speedBtn.innerHTML = `<i class="fas fa-tachometer-alt"></i> 速度: ${speedLabels[speedIndex]}`;
            
            // 如果正在播放，重新开始动画以应用新速度
            if (isPlaying) {
                stopAnimation();
                startAnimation();
            }
        }
        
        // 初始化
        function init() {
            initRailwayMap();
            updateTimeDisplay();
            updateTrainPositions();
            
            // 事件监听
            playBtn.addEventListener('click', startAnimation);
            pauseBtn.addEventListener('click', stopAnimation);
            resetBtn.addEventListener('click', resetAnimation);
            speedBtn.addEventListener('click', toggleSpeed);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
