# Nginx配置文件

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # HTTP重定向到HTTPS
    server {
        listen       8000;
        server_name  longjieruankong.xyz;  # 替换为您的域名或IP
        
        # 重定向所有HTTP请求到HTTPS
        return 301 https://$server_name$request_uri;
    }

    # HTTPS服务器配置
    server {
        listen       443 ssl;
        server_name  longjieruankong.xyz;  # 替换为您的域名或IP
        
        # SSL证书配置 - 替换为您的证书路径
        ssl_certificate      C:\SSL\longjieruankong.xyz.pem;  # 您的.pem文件路径
        ssl_certificate_key  C:\SSL\longjieruankong.xyz.key;      # 您的.key文件路径
        
        # SSL协议配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        
        # 静态文件缓存
        location /static/ {
            alias C:/path/to/your/static/files/;  # 如果有静态文件，设置路径
            expires 30d;
        }
        
        # 反向代理到Python应用
        location / {
            proxy_pass http://127.0.0.1:8000;  # 指向Python应用
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket支持（如果需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}